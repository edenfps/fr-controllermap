[General]
; Set to 0 to disable controller support without removing version.dll
Enabled=1
; XInput player index (0-3)
ControllerIndex=0
; Right stick deadzone (0.0 - 1.0)
Deadzone=0.20
; Left stick deadzone (0.0 - 1.0)
MoveDeadzone=0.12

[Camera]
; Higher = faster camera. Start around 8-12.
Sensitivity=10.0
; 1 = invert vertical camera
InvertY=0
; Free Realms uses hold-right-mouse + mouse move for camera on PC
RequireRightMouseButton=1
; Click R3 to toggle camera look / cursor mode

[AnalogMovement]
; Set UseMemory=1 after running tools/find_movement_addresses.py
UseMemory=0
; Example: MoveForwardAddress=01234567
MoveForwardAddress=0
StrafeAddress=0
SpeedScaleAddress=0

[Bindings]
; Virtual-key codes in decimal. Defaults match typical Free Realms PC bindings.
MoveForward=87
MoveBackward=83
StrafeLeft=65
StrafeRight=68
Jump=32
Interact=69
TabTarget=9
AutoRun=144
AltActionBar=192
DockAtlas=77
DockCharacter=67
DockJobs=74
DockQuests=76
DockInventory=73
ActionBar1=49
ActionBar2=50
ActionBar3=51
ActionBar4=52
ActionBar5=53
ActionBar6=54
ActionBar7=55
ActionBar8=56
ActionBar9=57

; Xbox layout (matches PS3-style Free Realms controller docs):
;   Left stick     = move (analog; partial tilt = walk via Shift when memory mode is off)
;   Right stick    = camera when look mode is on (toggle with R3)
;   A              = Jump
;   X              = Interact
;   Y              = Tab target
;   B              = Auto run
;   LB             = Alternate action bar
;   RB             = Inventory
;   LT / RT        = Action bar slots 1 / 2
;   D-pad Up       = Atlas
;   D-pad Left     = Character
;   D-pad Down     = Jobs
;   D-pad Right    = Quests
;   Back           = Action bar slot 9
;   Start          = Escape / menu
